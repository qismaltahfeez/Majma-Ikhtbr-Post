<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ikhtibar Post Generator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;700&family=Scheherazade+New:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Custom Uploaded Fonts */
        @font-face {
            font-family: 'Kanz al Marjaan';
            src: url('Kanz-al-Marjaan.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Al-Kanz for Windows';
            src: url('Al-Kanz for Windows.ttf') format('truetype');
        }

        :root { --primary: #1a5276; --gold: #d4af37; --bg: #1a1a2e; }
        body { font-family: 'Amiri', serif; background: var(--bg); color: #ecf0f1; margin: 0; padding: 20px; display: flex; flex-direction: row-reverse; gap: 30px; justify-content: center; }
        .editor-panel { background: #ffffff; color: #2c3e50; padding: 25px; border-radius: 15px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 8px solid var(--gold); height: 95vh; overflow-y: auto; text-align: right; }
        h2 { font-family: 'Aref Ruqaa', serif; text-align: center; color: var(--primary); margin-top: 0; }
        .field { margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input[type="text"], select, input[type="file"], input[type="range"], input[type="color"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #bdc3c7; box-sizing: border-box; font-family: 'Amiri'; font-size: 1em; }
        input[type="color"] { height: 45px; cursor: pointer; padding: 2px; }
        .preview-container { text-align: center; position: sticky; top: 20px; }
        canvas { border: 10px solid #fff; box-shadow: 0 15px 45px rgba(0,0,0,0.4); max-width: 500px; height: auto; background: #fff; border-radius: 4px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Aref Ruqaa'; font-weight: bold; background: #27ae60; color: white; font-size: 1.2em; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #219150; }
        @media (max-width: 900px) { body { flex-direction: column; align-items: center; } .editor-panel { width: 90%; height: auto; } }
    </style>
</head>
<body>

    <div class="editor-panel">
        <h2>Ikhtebaar Appreciation Post</h2>
        
        <div class="field">
            <label>1. Select Marhala</label>
            <select id="templateSelect" onchange="updateBackground()">
                <option value="">--Select Marhala--</option>
                <option value="M1.jpg">Marhala 1</option>
                <option value="M2.jpg">Marhala 2</option>
                <option value="M3.jpg">Marhala 3</option>
                <option value="M4.jpg">Marhala 4</option>
                <option value="M5.jpg">Marhala 5</option>
                <option value="M6.jpg">Marhala 6</option>
                <option value="M7.jpg">Marhala 7</option>
                <option value="M8.jpg">Marhala 8</option>
                <option value="IN.jpg">Ikhtebaar Nihaee</option>
            </select>
        </div>

        <div class="field">
            <label>2. Mohallah Institute / Imani Darsgah</label>
            <select id="instName">
                <option value="">-- Select --</option>
                <option value="قسم التحفيظ - جمالي محلة">جمالي محلة</option>
                <option value="قسم التحفيظ - المحلة البرهانية">المحلة البرهانية</option>
                <option value="قسم التحفيظ - برهاني باغ محلة">برهاني باغ محلة</option>
                <option value="قسم التحفيظ - المحلة الفخرية">المحلة الفخرية</option>
                <option value="قسم التحفيظ - المحلة المحمدية">المحلة المحمدية</option>
                <option value="قسم التحفيظ - عزي محلة">عزي محلة</option>
                <option value="قسم التحفيظ - طاهري محلة">طاهري محلة</option>
                <option value="قسم التحفيظ - محمدي محلة">محمدي محلة</option>
                <option value="قسم التحفيظ - صالح محلة">صالح محلة</option>
                <option value="قسم التحفيظ - اْدم محلة">اْدم محلة</option>
                <option value="قسم التحفيظ - عيسى محلة">عيسى محلة</option>
                <option value="قسم التحفيظ - سيفي محلة">سيفي محلة</option>
                <option value="قسم التحفيظ - ابراهيم محلة">ابراهيم محلة</option>
                <option value="قسم التحفيظ - يوسفي محلة">يوسفي محلة</option>
                <option value="قسم التحفيظ - برهاني محلة">برهاني محلة</option>
                <option value="قسم التحفيظ - قطبي محلة">قطبي محلة</option>
                <option value="قسم التحفيظ - حسني محلة">حسني محلة</option>
                <option value="قسم التحفيظ - حسيني محلة">حسيني محلة</option>
                <option value="قسم التحفيظ - برهاني نككر">برهاني نككر</option>
                <option value="قسم التحفيظ - بدري محلة">بدري محلة</option>
                <option value="قسم التحفيظ - ملتان">ملتان</option>
                <option value="قسم التحفيظ - لاهور">لاهور</option>
                <option value="قسم التحفيظ - ايبطاباد">ايبطاباد</option>
                <option value="قسم التحفيظ - راولثثندي">راولثثندي</option>
                <option value="قسم التحفيظ - كوئطه">كوئطه</option>
                <option value="المدرسة السيفية البرهانية - شبيراباد">المدرسة السيفية البرهانية - شبيراباد</option>
                <option value="المدرسة السيفية البرهانية - المحلة البرهانية">المدرسة السيفية البرهانية - المحلة البرهانية</option>
                <option value="بدري هائي اسكول">بدري هائي اسكول</option>
                <option value="حكيمي اسكول">حكيمي اسكول</option>
                <option value="حسامية اسكول">حسامية اسكول</option>
                <option value="سيفية بوئيز هائي اسكول">سيفية بوئيز هائي اسكول</option>
                <option value="سيفية ككرلز اسكول">سيفية ككرلز اسكول</option>
                <option value="روضة القراْن الكريم">روضة القراْن الكريم</option>
            </select>
        </div>

        <div class="field">
            <label>3. Typography (Student Details)</label>
            <select id="fontSelect">
                <option value="Amiri">Amiri (Default)</option>
                <option value="Aref Ruqaa">Aref Ruqaa</option>
                <option value="Scheherazade New">Scheherazade New</option>
                <option value="Al-Kanz for Windows">Al-Kanz</option>
                <option value="Kanz al Marjaan">Kanz al Marjaan</option>
            </select>
            <label style="font-size: 0.75em; margin-top:8px;">Color for Student Names</label>
            <input type="color" id="nameColor" value="#ffffff">
        </div>

        <div class="field">
            <label>4. Student Details</label>
            <input type="text" id="stdFirstName" placeholder="الاسم (First Name)">
            <input type="text" id="stdFatherName" placeholder="اسم الوالد / زوج (Father/Husband)">
            <input type="text" id="stdSurname" placeholder="اللقب (Surname)">
            <input type="text" id="stdAge" placeholder="العمر (Age)">
        </div>

        <div class="field">
            <label>5. Day & Dates</label>
            <select id="dayArabic">
                <option value="">-- Day --</option>
                <option value="يوم السبت">يوم السبت</option>
                <option value="يوم الأحد">يوم الأحد</option>
                <option value="يوم الإثنين">يوم الإثنين</option>
                <option value="يوم الثلاثاء">يوم الثلاثاء</option>
                <option value="يوم الأربعاء">يوم الأربعاء</option>
                <option value="يوم الخميس">يوم الخميس</option>
                <option value="يوم الجمعة">يوم الجمعة</option>
            </select>
            <input type="text" id="dateHijri" placeholder="التاريخ الهجري">
            <input type="text" id="dateGreg" placeholder="Gregorian Date">
        </div>

        <div class="field">
            <label>6. Photo Controls</label>
            <input type="file" id="studentUpload" accept="image/*">
            <label style="font-size:0.7em; margin-top:5px;">Zoom</label>
            <input type="range" id="photoZoom" min="0.5" max="3.0" step="0.1" value="1">
            <label style="font-size:0.7em; margin-top:5px;">Vertical Position</label>
            <input type="range" id="photoYOffset" min="-500" max="500" value="0">
        </div>

        <button onclick="download()">Download PNG</button>
    </div>

    <div class="preview-container">
        <!-- Canvas dimensions matching template aspect ratio -->
        <canvas id="canvas" width="1224" height="1550"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let bgImage = new Image();
        let studentImage = null;

        // Coordinates matched to your template image
        const POS = {
            // Top Left area next to the round stamp
            inst: { x: 500, y: 320, maxWidth: 450 },
            
            // Central Circular Frame
            photo: { x: 618, y: 785, radius: 180 },
            
            // Brown Bar Area (Text aligns from the right side inside bar)
            nameFirst: { x: 140, y: 710, maxWidth: 330 },
            nameFull: { x: 140, y: 780, maxWidth: 330 },
            age: { x: 140, y: 845 },
            
            // Bottom Area (Positioned next to "تاريخ الاختبار:")
            dateX: 680,
            dateH_Y: 1285,
            dateG_Y: 1335
        };

        const instFont = "Amiri";

        const controls = ['instName', 'fontSelect', 'stdFirstName', 'nameColor', 'stdFatherName', 'stdSurname', 'stdAge', 'dateHijri', 'dateGreg', 'photoZoom', 'photoYOffset', 'dayArabic'];
        controls.forEach(id => document.getElementById(id).addEventListener('input', draw));

        function drawText(text, x, y, maxWidth, baseSize, font, isBold, color, align='right') {
            if (!text) return;
            let size = baseSize;
            ctx.textAlign = align;
            ctx.fillStyle = color;
            ctx.font = `${isBold ? 'bold' : ''} ${size}px "${font}"`;
            while (ctx.measureText(text).width > maxWidth && size > 12) {
                size--;
                ctx.font = `${isBold ? 'bold' : ''} ${size}px "${font}"`;
            }
            ctx.fillText(text, x, y);
        }

        function draw() {
            const studentFont = document.getElementById('fontSelect').value;
            const chosenColor = document.getElementById('nameColor').value;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Draw Template Background
            if (bgImage.complete && bgImage.src) {
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            }

            // 2. Student Photo (Inside Circular Mask)
            if (studentImage) {
                ctx.save();
                ctx.beginPath(); 
                ctx.arc(POS.photo.x, POS.photo.y, POS.photo.radius, 0, Math.PI * 2); 
                ctx.clip();
                
                const zoom = parseFloat(document.getElementById('photoZoom').value);
                const yOff = parseFloat(document.getElementById('photoYOffset').value);
                const ratio = Math.max((POS.photo.radius*2) / studentImage.width, (POS.photo.radius*2) / studentImage.height) * zoom;
                
                ctx.drawImage(
                    studentImage, 
                    POS.photo.x - (studentImage.width * ratio / 2), 
                    POS.photo.y - (studentImage.height * ratio / 2) + yOff, 
                    studentImage.width * ratio, 
                    studentImage.height * ratio
                );
                ctx.restore();
            }

            // 3. Institute / Mohallah Name
            ctx.save();
            ctx.direction = 'rtl';
            drawText(document.getElementById('instName').value, POS.inst.x, POS.inst.y, POS.inst.maxWidth, 40, instFont, true, '#1a5276', 'center');
            ctx.restore();

            // 4. Student Names & Age (Inside Brown Bar)
            ctx.save();
            ctx.direction = 'rtl';
            
            // First Name
            drawText(document.getElementById('stdFirstName').value, POS.nameFirst.x, POS.nameFirst.y, POS.nameFirst.maxWidth, 50, studentFont, true, chosenColor, 'right');
            
            // Full Name (Father + Surname)
            const fullNameLine = (document.getElementById('stdFatherName').value + " " + document.getElementById('stdSurname').value).trim();
            drawText(fullNameLine, POS.nameFull.x, POS.nameFull.y, POS.nameFull.maxWidth, 38, studentFont, false, chosenColor, 'right');

            // Age
            const ageText = document.getElementById('stdAge').value;
            if (ageText) {
                drawText(ageText + " ورس", POS.age.x, POS.age.y, 300, 34, studentFont, false, chosenColor, 'right');
            }
            ctx.restore();

            // 5. Test Date (Bottom Area beside "تاريخ الاختبار:")
            ctx.save();
            ctx.direction = 'rtl';
            const hijriLine = document.getElementById('dateHijri').value + (document.getElementById('dayArabic').value ? "، " + document.getElementById('dayArabic').value : "");
            drawText(hijriLine, POS.dateX, POS.dateH_Y, 400, 36, "Amiri", true, '#1b5e20', 'left');

            ctx.direction = 'ltr';
            drawText(document.getElementById('dateGreg').value, POS.dateX, POS.dateG_Y, 400, 28, "Amiri", false, '#1b5e20', 'left');
            ctx.restore();
        }

        function updateBackground() {
            const url = document.getElementById('templateSelect').value;
            if(url) { 
                bgImage.crossOrigin = "anonymous"; 
                bgImage.src = url; 
                bgImage.onload = draw; 
            }
        }

        // Initialize default background image on load
        window.onload = () => {
            bgImage.src = document.getElementById('templateSelect').value || "M1.jpg";
            bgImage.onload = draw;
        };

        document.getElementById('studentUpload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => { 
                studentImage = new Image(); 
                studentImage.onload = draw; 
                studentImage.src = f.target.result; 
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function download() {
            const link = document.createElement('a');
            link.download = 'Ikhtibar_Post.png';
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
    </script>
</body>
</html>
